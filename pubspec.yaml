name: senior
package: com.senior.app
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.38.4'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.11.0
  go_router: ^17.3.0
  provider: ^6.1.2
  universal_html: ^2.2.4
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.3
  flutter_spinkit: ^5.2.1
  flutter_svg: ^2.0.17
  image_picker: ^1.1.2
  flex_color_picker: ^3.6.0
  firebase_storage: ^13.4.3
  shared_preferences: ^2.5.1
  google_sign_in: ^7.2.0
  google_fonts: ^8.1.0
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  syncfusion_flutter_calendar: ^33.2.13
  logger: ^2.5.0
  http: ^1.6.0
  flutter_web_plugins:
    sdk: flutter
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/cards/
    - assets/social media/
    - assets/images/
    - assets/svgs/
    - assets/icons/
